<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AZZAS 2154 — Rateios Animale</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Karla:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f4f6fa;
  --surface:#ffffff;
  --card:#ffffff;
  --card2:#f8fafc;
  --border:#e4e8f0;
  --border2:#d3d9e6;
  --gold:#a87f24;
  --gold-bg:#faf3e0;
  --blue:#3a72b8;
  --blue-bg:#eaf1fa;
  --teal:#1f8e7d;
  --teal-bg:#e6f5f2;
  --red:#c0504d;
  --txt:#2b3243;
  --txt2:#5d6781;
  --txt3:#9099b0;
  --ink:#1a2030;
  --green:#2c9e57;
  --green-bg:#e8f6ed;
  --warn:#c47d1e;
  --warn-bg:#fcf2e2;
  --shadow:0 1px 3px rgba(20,30,60,.06),0 1px 2px rgba(20,30,60,.04);
  --shadow-lg:0 8px 28px rgba(30,45,80,.10);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--txt);font-family:'Karla',sans-serif;font-size:14px;line-height:1.5;}
/* ---- NAV ---- */
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;height:56px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:100;box-shadow:var(--shadow);}
.topbar-brand{font-family:'Cormorant Garamond',serif;font-size:19px;font-weight:600;color:var(--gold);letter-spacing:1px;}
.topbar-sep{color:var(--border2);}
.topbar-title{color:var(--txt2);font-size:13px;}
.content{padding:24px;max-width:1500px;margin:0 auto;}
/* ---- SECTION ---- */
.sec-head{display:flex;align-items:baseline;gap:12px;margin:4px 0 16px;cursor:pointer;user-select:none;}
.sec-head h2{font-family:'Cormorant Garamond',serif;font-size:25px;color:var(--ink);font-weight:600;}
.sec-head .sub{color:var(--txt2);font-size:13px;}
.sec-head .toggle{margin-left:auto;font-size:12px;color:var(--txt3);border:1px solid var(--border2);border-radius:5px;padding:3px 10px;}
/* ---- LEGEND CARDS ---- */
.legend{display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:14px;margin-bottom:30px;}
.legend.collapsed{display:none;}
.lcard{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px 17px;box-shadow:var(--shadow);transition:.2s;border-top:3px solid var(--gold);}
.lcard.desp{border-top-color:var(--teal);}
.lcard:hover{box-shadow:var(--shadow-lg);transform:translateY(-2px);}
.lcard-title{font-family:'Cormorant Garamond',serif;font-size:19px;color:var(--ink);font-weight:600;margin-bottom:10px;}
.lcard-badges{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px;}
.lcard-row{display:flex;gap:8px;font-size:12.5px;margin-bottom:7px;line-height:1.45;}
.lcard-row .k{color:var(--txt3);min-width:78px;flex-shrink:0;font-weight:600;text-transform:uppercase;font-size:10px;letter-spacing:.4px;padding-top:2px;}
.lcard-row .v{color:var(--txt);}
/* ---- BADGES ---- */
.b{display:inline-flex;align-items:center;font-size:10.5px;padding:2.5px 9px;border-radius:20px;font-weight:600;letter-spacing:.2px;border:1px solid transparent;white-space:nowrap;}
.b-ggf{background:var(--gold-bg);color:var(--gold);border-color:#ecdcb0;}
.b-desp{background:var(--teal-bg);color:var(--teal);border-color:#bfe5dd;}
.b-od{background:var(--blue-bg);color:var(--blue);border-color:#c5d8ef;}
.b-sim{background:var(--green-bg);color:var(--green);border-color:#bfe6cd;}
.b-nao{background:#f0f2f6;color:var(--txt2);border-color:var(--border2);}
.b-fin{background:var(--blue-bg);color:var(--blue);border-color:#c5d8ef;}
.b-count{background:var(--gold-bg);color:var(--gold);border:1px solid #ecdcb0;font-size:10px;padding:2px 8px;border-radius:12px;font-weight:600;margin-left:8px;}
.b-count.blue{background:var(--blue-bg);color:var(--blue);border-color:#c5d8ef;}
/* ---- FILTER ---- */
.filter-bar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:16px;}
.filter-bar input{background:var(--surface);border:1px solid var(--border2);color:var(--txt);padding:9px 13px;border-radius:7px;font-family:'Karla',sans-serif;font-size:13px;outline:none;transition:.2s;min-width:260px;box-shadow:var(--shadow);}
.filter-bar input:focus{border-color:var(--gold);}
.count-badge{background:var(--surface);border:1px solid var(--border);color:var(--txt2);font-size:12px;padding:6px 12px;border-radius:20px;margin-left:auto;box-shadow:var(--shadow);}
/* ---- TABS ---- */
.tabs{display:flex;gap:4px;border-bottom:2px solid var(--border);margin-bottom:18px;}
.tab{padding:10px 20px;cursor:pointer;color:var(--txt2);font-size:13px;font-weight:600;border-bottom:2px solid transparent;margin-bottom:-2px;transition:.2s;border-radius:6px 6px 0 0;}
.tab.active{color:var(--gold);border-color:var(--gold);background:var(--gold-bg);}
.tab:hover{color:var(--ink);}
/* ---- TABLE ---- */
.tbl-wrap{overflow-x:auto;border-radius:10px;border:1px solid var(--border);background:var(--surface);box-shadow:var(--shadow);}
table{border-collapse:collapse;width:100%;min-width:600px;}
th{background:var(--card2);color:var(--txt2);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;padding:11px 13px;text-align:left;border-bottom:1px solid var(--border);white-space:nowrap;position:sticky;top:0;z-index:5;}
td{padding:8px 13px;border-bottom:1px solid var(--border);font-size:13px;vertical-align:top;}
tr:last-child td{border-bottom:none;}
/* ---- HIERARCHY ---- */
.hier-table .row-method{background:var(--card2);cursor:pointer;user-select:none;}
.hier-table .row-method td{padding:12px 14px;border-bottom:1px solid var(--border);}
.hier-table .row-method:hover td{background:var(--gold-bg);}
.m-title{font-weight:700;color:var(--ink);font-size:14px;display:flex;align-items:center;flex-wrap:wrap;gap:7px;}
.m-meta{margin:8px 0 0 19px;display:flex;flex-direction:column;gap:4px;}
.m-meta .line{font-size:12px;color:var(--txt2);}
.m-meta .line b{color:var(--txt);font-weight:600;}
.m-meta .k{color:var(--txt3);font-weight:700;text-transform:uppercase;font-size:9.5px;letter-spacing:.4px;margin-right:5px;}
.hier-table .row-cc{background:var(--surface);cursor:pointer;user-select:none;}
.hier-table .row-cc td{padding:9px 14px 9px 30px;color:var(--blue);border-bottom:1px solid var(--border);font-size:12.5px;font-weight:600;}
.hier-table .row-cc:hover td{background:var(--blue-bg);}
.cc-label{display:inline-block;font-size:10px;padding:2px 9px;border-radius:11px;font-weight:600;margin-left:8px;border:1px solid transparent;vertical-align:middle;letter-spacing:.2px;}
.cc-label.ggf{background:var(--gold-bg);color:var(--gold);border-color:#ecdcb0;}
.cc-label.desp{background:var(--teal-bg);color:var(--teal);border-color:#bfe5dd;}
.cc-label.metr{background:var(--warn-bg);color:var(--warn);border-color:#eccfa0;}
.cc-label.od{background:var(--blue-bg);color:var(--blue);border-color:#c5d8ef;}
.row-cc.leaf td{padding-left:30px;color:var(--txt);font-weight:500;}
.vig{display:inline-block;font-size:10px;padding:2px 9px;border-radius:11px;margin-left:6px;background:var(--warn-bg);color:var(--warn);border:1px solid #eccfa0;font-weight:700;white-space:normal;}
.drv{display:inline-block;font-size:10px;padding:2px 9px;border-radius:11px;margin-left:6px;background:var(--green-bg);color:var(--green);border:1px solid #bfe6cd;font-weight:600;white-space:normal;cursor:help;}
.val{float:right;font-size:11px;font-weight:700;color:var(--ink);background:var(--card2);border:1px solid var(--border);border-radius:5px;padding:1px 8px;margin-left:8px;font-variant-numeric:tabular-nums;}
.tip{display:inline-block;font-size:9px;font-weight:700;padding:1px 6px;border-radius:9px;margin-right:7px;border:1px solid transparent;text-transform:uppercase;letter-spacing:.3px;}
.t-ggf{background:var(--gold-bg);color:var(--gold);border-color:#ecdcb0;}
.t-desp{background:var(--teal-bg);color:var(--teal);border-color:#bfe5dd;}
.t-od{background:var(--blue-bg);color:var(--blue);border-color:#c5d8ef;}
.hier-table .row-item td{padding:7px 14px 7px 52px;color:var(--txt2);border-bottom:1px solid var(--border);font-size:12.5px;}
.hier-table .row-item:hover td{background:var(--card2);}
.hier-table .row-item .pac{color:var(--txt3);}
.caret{display:inline-block;margin-right:8px;transition:.2s;font-size:10px;color:var(--txt3);}
.caret.open{transform:rotate(90deg);}
/* ---- FE TAGS ---- */
.fe-tags{display:flex;flex-wrap:wrap;gap:5px;}
.fe-tag{display:inline-block;font-size:11px;padding:3px 9px;border-radius:5px;font-weight:600;cursor:help;border:1px solid transparent;}
.fe-tag.ggf{background:var(--gold-bg);color:var(--gold);border-color:#ecdcb0;}
.fe-tag.desp{background:var(--teal-bg);color:var(--teal);border-color:#bfe5dd;}
.fe-tag.metragem{background:var(--warn-bg);color:var(--warn);border-color:#eccfa0;font-weight:700;}
.empty-state{text-align:center;padding:50px 20px;color:var(--txt3);}
.note{font-size:12px;color:var(--txt3);margin-top:14px;line-height:1.5;}
.callout{background:var(--warn-bg);border:1px solid #eccfa0;border-left:3px solid var(--warn);border-radius:8px;padding:12px 15px;color:var(--txt);font-size:12.5px;line-height:1.55;}
.callout b{color:var(--ink);}
/* ---- ATENÇÃO / DÚVIDA ---- */
.warn-icon{display:inline-flex;align-items:center;justify-content:center;background:#fff3cd;border:1px solid #ffc107;border-radius:4px;padding:1px 5px;font-size:11px;color:#856404;font-weight:700;cursor:help;margin-left:6px;line-height:1.4;vertical-align:middle;}
.warn-note{display:flex;align-items:flex-start;gap:7px;background:#fff8e1;border:1px solid #eccfa0;border-left:3px solid #c47d1e;border-radius:7px;padding:8px 12px;font-size:12px;color:#7a4800;line-height:1.55;margin:6px 0 2px 0;font-weight:500;}
.warn-note .wi{flex-shrink:0;font-size:16px;margin-top:1px;}
.warn-note .wt{font-weight:700;display:block;margin-bottom:2px;font-size:12.5px;}
.warn-icon-lcard{display:inline-flex;align-items:center;gap:4px;background:#fff3cd;border:1px solid #ffc107;border-radius:5px;padding:2px 8px;font-size:11px;color:#856404;font-weight:700;margin-left:6px;}
</style>
</head>

  const ensureCost=c=>{ if(!map.has(c)) map.set(c,new Map()); return map.get(c); };
  const ensureCC=(cm,cc)=>{ if(!cm.has(cc)) cm.set(cc,{tipos:new Set(),items:new Map()}); return cm.get(cc); };
  const addItems=(e,arr,tipo)=>{ for(const it of (arr||[])){ if(!it.conta) continue; e.items.set(tipo+'|'+(it.pacote||'')+'|'+it.conta,{pacote:it.pacote,conta:it.conta,val:it.val||0,tipo:tipo}); } };
  // (a) GGF (com contas) — de RATEIO[brand]
  for(const m of (RATEIO[brand]||RATEIO[tab]||[])){
    const cost=baseCost(m.metodo), cm=ensureCost(cost);
    for(const cc of m.ccs){ const e=ensureCC(cm,cc.cc); e.tipos.add('GGF'); addItems(e,cc.items,'GGF'); }
  }
  // (b) Despesas Rateadas (com contas) — de DESPR[brand]
  const dr=(typeof DESPR!=='undefined'?DESPR[brand]:null)||{};
  for(const cost in dr){ const cm=ensureCost(cost); for(const cc in dr[cost]){ const e=ensureCC(cm,cc); e.tipos.add('Despesa'); addItems(e,dr[cost][cc],'Despesa'); } }
  // (c) Outras Despesas (com contas) — de OD_SRC[brand] (OD_FULL na versão 3 marcas; OD_EXTRA nas demais)
  const od=(OD_SRC&&OD_SRC[brand])||{};
  for(const cost in od){ const cm=ensureCost(cost); for(const cc in od[cost]){ const e=ensureCC(cm,cc); e.tipos.add('OD'); addItems(e,od[cost][cc],'OD'); } }
  // finaliza
  const out=[];
  const names=[...map.keys()].sort((a,b)=>{const ia=ORDER.indexOf(a),ib=ORDER.indexOf(b);return (ia<0?99:ia)-(ib<0?99:ib);});
  const rank={GGF:0,'GGF+OD':1,OD:2,Despesa:3};
  for(const cost of names){
    const cm=map.get(cost);
    const ccs=[...cm].map(([cc,e])=>{
      let tipos=new Set(e.tipos); // APOIO CD BELA no Corte é GGF (entra a partir de 07/2026)
      const isDesp=tipos.has('Despesa');
      const tipoKey = isDesp?'Despesa':(tipos.has('GGF')&&tipos.has('OD')?'GGF+OD':(tipos.has('GGF')?'GGF':'OD'));
      const rateio = isDesp?despRateio(cost,cc):'% do financeiro';
      const its=[...e.items.values()];
      const val=its.reduce((s,x)=>s+(x.val||0),0);
      return {cc, tipoKey, rateio, vigencia:vigenciaFor(cost,cc), items:its, val:val};
    }).sort((a,b)=> (rank[a.tipoKey]-rank[b.tipoKey]) || a.cc.localeCompare(b.cc));
    out.push({metodo:cost,ccs});
  }
  return out;
}
function getTab(tab){ if(!MERGED[tab]) MERGED[tab]=buildTab(tab); return MERGED[tab]; }

function flagsOf(ccs){ return {g:ccs.some(c=>c.tipoKey==='GGF'||c.tipoKey==='GGF+OD'), d:ccs.some(c=>c.tipoKey==='Despesa'), o:ccs.some(c=>c.tipoKey==='OD'||c.tipoKey==='GGF+OD')}; }
function costBadges(meta,f){
  let h='';
  if(f.g) h+='<span class="b b-ggf">GGF</span>';
  if(f.d) h+='<span class="b b-desp">Despesa Rateada</span>';
  if(f.o) h+='<span class="b b-od">Outras Despesas</span>';
  if(meta && (meta.anual===true||meta.anual===false)) h+='<span class="b '+(meta.anual?'b-sim':'b-nao')+'">Anualizado: '+(meta.anual?'Sim':'Não')+'</span>';
  return h;
}
/* Coleção por marca: usa colBy[marca] quando existir, senão col */
function colOf(meta,tab){ if(!meta) return ''; const b=BRAND[tab]; return (meta.colBy && meta.colBy[b]) ? meta.colBy[b] : (meta.col||''); }
function ccLabel(cc){
  const vig=cc.vigencia?'<span class="vig">📅 '+esc(cc.vigencia)+'</span>':'';
  const drvTxt=(typeof PCT_DRIVER!=='undefined' && PCT_DRIVER[cc.cc]) ? PCT_DRIVER[cc.cc] : '';
  const drv = drvTxt ? '<span class="drv" title="Driver do % do financeiro — muda a cada ano">📈 '+esc(drvTxt)+'</span>' : '';
  const fin = drvTxt ? ' · '+esc(cc.rateio) : '';   // só mostra "% do financeiro" se o CC tiver rateio do financeiro
  if(cc.tipoKey==='GGF')    return '<span class="cc-label ggf">GGF'+fin+'</span>'+drv+vig;
  if(cc.tipoKey==='OD')     return '<span class="cc-label od">Outras Despesas'+fin+'</span>'+drv+vig;
  if(cc.tipoKey==='GGF+OD') return '<span class="cc-label ggf">GGF</span><span class="cc-label od">Outras Despesas'+fin+'</span>'+drv+vig;
  const metr=cc.rateio.indexOf('metragem')>=0;
  return '<span class="cc-label '+(metr?'metr':'desp')+'">Despesa · '+esc(cc.rateio)+'</span>'+vig;
}

function renderLegend(){
  document.getElementById('legend').innerHTML=ORDER.map(name=>{
    const m=META[name]; if(!m) return '';
    const tabData=getTab(rateioTab_);
    const mData=tabData.find(x=>x.metodo===name);
    const hasCCWarnLegend = mData && mData.ccs.some(c=>ATENCAO_CC[c.cc]);
    const hasWarn = !!ATENCAO_METODO[name] || hasCCWarnLegend;
    const warnTooltip = ATENCAO_METODO[name]||(hasCCWarnLegend?'Ver centros de custo com pontos de atenção':'');
    let rows='';
    if(m.ggf) rows+='<div class="lcard-row"><span class="k">GGF · marca</span><span class="v">'+esc(m.ggfMarca)+'</span></div>';
    if(m.desp) rows+='<div class="lcard-row"><span class="k">Desp. · marca</span><span class="v">'+esc(m.despMarca)+'</span></div>';
    if(m.od) rows+='<div class="lcard-row"><span class="k">Out.Desp · marca</span><span class="v">'+esc(m.odMarca)+'</span></div>';
    const warnRow = hasWarn ? '<div class="lcard-row" style="margin-top:6px"><span class="warn-icon-lcard">⚠️ Ponto de atenção</span></div>' : '';
    return '<div class="lcard'+(m.ggf?'':' desp')+'">'
      +'<div class="lcard-title">'+esc(LABEL[name]||name)+(hasWarn?' <span class="warn-icon" title="'+esc(warnTooltip)+'">⚠️</span>':'')+'</div>'
      +'<div class="lcard-badges">'+costBadges(m,{g:m.ggf,d:m.desp,o:m.od})+'</div>'
      +rows+warnRow
      +'<div class="lcard-row"><span class="k">Coleções</span><span class="v">'+esc(colOf(m,rateioTab_))+'</span></div>'
      +'<div class="lcard-row"><span class="k">Aplica a</span><span class="v">'+esc(m.aplica)+'</span></div>'
      +'</div>';
  }).join('');
}
function toggleLegend(){
  const l=document.getElementById('legend'),t=document.getElementById('legToggle');
  l.classList.toggle('collapsed');
  t.textContent=l.classList.contains('collapsed')?'mostrar ▼':'ocultar ▲';
}

let rateioTab_=(document.querySelector('#r-tabs .tab.active')&&document.querySelector('#r-tabs .tab.active').getAttribute('data-tab'))||'farm';
function rateioTab(t,el){
  rateioTab_=t;
  document.querySelectorAll('#r-tabs .tab').forEach(x=>x.classList.remove('active'));
  el.classList.add('active');
  rateioRender();
  renderLegend();
}

function rateioRender(){
  const q=(document.getElementById('r-search').value||'').toLowerCase();
  const tbody=document.getElementById('r-tbody');
  document.querySelector('#r-table thead tr').innerHTML='<th style="width:360px">Método de Rateio</th><th>Centro de Custo</th><th>Pacote</th><th>Conta</th>';
  document.getElementById('r-note').innerHTML='Clique em um custo para ver os centros de custo. Rótulos: <span class="cc-label ggf" style="cursor:default">GGF · % do financeiro</span> · <span class="cc-label od" style="cursor:default">Outras Despesas · % do financeiro</span> · <span class="cc-label desp" style="cursor:default">Despesa · rateio específico</span> (<span class="cc-label metr" style="cursor:default">por metragem</span> no CD Pavuna). Um mesmo custo pode ter mais de um tipo.'+(SHOW_VALUES?' Os valores <span class="val" style="float:none">R$</span> são o <b>total de 2025</b> (custo) por custo, centro de custo e conta.':'')+'';
  const data=getTab(rateioTab_);
  let rows=[],count=0,mi=0;
  for(const metodo of data){
    const mIdx=mi++;
    const meta=META[metodo.metodo]||null;
    const matchMetodo=!q||metodo.metodo.toLowerCase().includes(q);
    const visibleCCs=[];
    for(const cc of metodo.ccs){
      const matchCC=!q||cc.cc.toLowerCase().includes(q)||(cc.rateio||'').toLowerCase().includes(q);
      const visItems=cc.items.filter(it=>!q||(it.pacote||'').toLowerCase().includes(q)||(it.conta||'').toLowerCase().includes(q));
      if(matchMetodo||matchCC||visItems.length>0){ const its=matchMetodo||matchCC?cc.items:visItems; visibleCCs.push({cc:cc.cc,tipoKey:cc.tipoKey,rateio:cc.rateio,vigencia:cc.vigencia,items:its,val:its.reduce((s,x)=>s+(x.val||0),0)}); }
    }
    if(!visibleCCs.length) continue;
    if(EXCLUDED.has(metodo.metodo)) continue;
    count+=visibleCCs.length;
    const f=flagsOf(metodo.ccs);
    const warnM = ATENCAO_METODO[metodo.metodo]||'';
    const warnMfromCC = visibleCCs.some(c=>ATENCAO_CC[c.cc]);
    const showWarnMethodIcon = warnM||warnMfromCC;
    let metaHtml='';
    if(meta){
      let mk='';
      if(meta.ggf) mk+='<div class="line"><span class="k">GGF · marca</span><b>'+esc(meta.ggfMarca)+'</b></div>';
      if(meta.desp) mk+='<div class="line"><span class="k">Desp · marca</span><b>'+esc(meta.despMarca)+'</b></div>';
      if(meta.od) mk+='<div class="line"><span class="k">Out.Desp · marca</span><b>'+esc(meta.odMarca)+'</b></div>';
      metaHtml='<div class="m-meta">'+mk
        +'<div class="line"><span class="k">Coleções</span>'+esc(colOf(meta,rateioTab_))+'</div>'
        +'<div class="line"><span class="k">Aplica a</span>'+esc(meta.aplica)+'</div></div>';
    }
    const costVal=visibleCCs.reduce((s,c)=>s+(c.val||0),0);
    rows.push('<tr class="row-method" onclick="toggleM('+mIdx+')">'
      +'<td colspan="4"><div class="m-title"><span class="caret" id="mcar'+mIdx+'">▶</span>'+esc(LABEL[metodo.metodo]||metodo.metodo)
      +' <span class="b-count">'+visibleCCs.length+' CC'+(visibleCCs.length>1?'s':'')+'</span>'+costBadges(meta,f)+valChip(costVal)
      +(showWarnMethodIcon?warnIcon(warnM||'Ver CCs com pontos de atenção abaixo'):'')+'</div>'+metaHtml
      +(warnM?warnNote(warnM):'')+'</td></tr>');
    let ci=0;
    for(const cc of visibleCCs){
      const cIdx=mIdx*10000+(ci++);
      const warnCC = ATENCAO_CC[cc.cc]||'';
      if(cc.items.length>0){
        rows.push('<tr class="row-cc" data-m="'+mIdx+'" data-c="'+cIdx+'" onclick="toggleC('+mIdx+','+cIdx+')" style="display:none">'
          +'<td></td><td colspan="3"><span class="caret" id="ccar'+cIdx+'">▶</span>'+esc(cc.cc)
          +' <span class="b-count blue">'+cc.items.length+'</span>'+ccLabel(cc)+valChip(cc.val)
          +(warnCC?warnIcon(warnCC):'')+(warnCC?'<br>'+warnNote(warnCC):'')+'</td></tr>');
        for(const it of cc.items){
          const itp=(cc.tipoKey==='GGF+OD')?(it.tipo||'GGF'):(cc.tipoKey==='Despesa'?'Despesa':(cc.tipoKey==='OD'?'OD':'GGF'));
          rows.push('<tr class="row-item" data-c="'+cIdx+'" style="display:none">'
            +'<td></td><td></td><td class="pac">'+esc(it.pacote)+'</td><td>'+tipChip(itp)+esc(it.conta)+valChip(it.val)+'</td></tr>');
        }
      } else {
        rows.push('<tr class="row-cc leaf" data-m="'+mIdx+'" style="display:none">'
          +'<td></td><td colspan="3">'+esc(cc.cc)+ccLabel(cc)+valChip(cc.val)
          +(warnCC?warnIcon(warnCC):'')+(warnCC?'<br>'+warnNote(warnCC):'')+'</td></tr>');
      }
    }
  }
  tbody.innerHTML=rows.length?rows.join(''):'<tr><td colspan="4" class="empty-state">Nenhum resultado para “'+esc(q)+'”.</td></tr>';
  document.getElementById('r-count').textContent=count+' centros de custo';
}
function toggleM(mIdx){
  const car=document.getElementById('mcar'+mIdx);
  const isOpen=car.classList.contains('open');
  car.classList.toggle('open',!isOpen);
  document.querySelectorAll('[data-m="'+mIdx+'"]').forEach(el=>{
    el.style.display=isOpen?'none':'';
    if(isOpen){const cc=el.querySelector('[id^="ccar"]');if(cc)cc.classList.remove('open');}
  });
  if(isOpen){
    document.querySelectorAll('[data-m="'+mIdx+'"]').forEach(ccrow=>{
      const cidx=ccrow.getAttribute('data-c');
      if(cidx) document.querySelectorAll('.row-item[data-c="'+cidx+'"]').forEach(it=>it.style.display='none');
    });
  }
}
function toggleC(mIdx,cIdx){
  const car=document.getElementById('ccar'+cIdx);
  const isOpen=car.classList.contains('open');
  car.classList.toggle('open',!isOpen);
  document.querySelectorAll('.row-item[data-c="'+cIdx+'"]').forEach(el=>el.style.display=isOpen?'none':'');
}

renderLegend();
rateioRender();
</script>
